name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Autotests (non-runner)
      id: autotests-non-runner
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Autotests (non-runner)
        setup-command: pip install -r requirements.txt
        command: pytest
        timeout: 2
        max-score: 1
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        AUTOTESTS-NON-RUNNER_RESULTS: "${{steps.autotests-non-runner.outputs.result}}"
      with:
        runners: autotests-non-runner
